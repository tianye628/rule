;启用自定义规则集
enable_rule_generator=true
overwrite_original_rules=true

; ====================== 你新增的 DNS 配置 ======================
dns:
  enable: true
  listen: :7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  ipv6: false

  proxy-server-nameserver:
    - https://8.8.8.8/dns-query#DNSg
    - https://1.1.1.1/dns-query#DNSg

  nameserver:
    - 127.0.0.1:5225 # 指向你的本地 AdGuard Home

  fallback:
    - https://dns.google/dns-query#DNSg
    - https://cloudflare-dns.com/dns-query#DNSg

  fallback-filter:
    geoip: true
    geoip-code: CN

  nameserver-policy:
    "geosite:cn": 127.0.0.1:5225 # 国内域名强制走你的 AdGuard Home
